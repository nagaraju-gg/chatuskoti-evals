<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Georgia, serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <linearGradient id="t-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d32f2f" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#2e7d32" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#111">Scalar Projection Collapse</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#555">Four states, identical T, four different required actions</text>

  <!-- Arrow: projection from Vec3 space to T line -->
  <line x1="120" y1="380" x2="680" y2="380" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="400" y="395" text-anchor="middle" font-size="13" fill="#999" font-style="italic">Projection onto T (scalar evaluation)</text>

  <!-- T axis label -->
  <text x="680" y="375" text-anchor="start" font-size="15" fill="#333">T</text>

  <!-- T axis range -->
  <text x="50" y="375" text-anchor="start" font-size="11" fill="#999">negative</text>
  <text x="640" y="375" text-anchor="end" font-size="11" fill="#999">positive</text>

  <!-- T=0 threshold line -->
  <line x1="300" y1="320" x2="300" y2="385" stroke="#e53935" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="300" y="410" text-anchor="middle" font-size="12" fill="#e53935" font-weight="bold">T = 0 threshold</text>

  <!-- === Vec3 Cube (left side) === -->
  <g transform="translate(80, 100)">
    <!-- 3D cube -->
    <!-- Front face -->
    <polygon points="0,0 120,0 120,120 0,120" fill="none" stroke="#555" stroke-width="1.5"/>
    <!-- Back face -->
    <polygon points="40,-40 160,-40 160,80 40,80" fill="none" stroke="#555" stroke-width="1.5"/>
    <!-- Connecting lines -->
    <line x1="120" y1="0" x2="160" y2="-40" stroke="#555" stroke-width="1.5"/>
    <line x1="120" y1="120" x2="160" y2="80" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="120" x2="40" y2="80" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="40" y2="-40" stroke="#555" stroke-width="1.5"/>

    <!-- Axis labels -->
    <text x="130" y="15" font-size="12" fill="#1565c0" font-weight="bold">T</text>
    <text x="-10" y="135" font-size="12" fill="#c62828" font-weight="bold">R</text>
    <text x="170" y="90" font-size="12" fill="#2e7d32" font-weight="bold">V</text>

    <!-- States in Vec3 space -->
    <!-- Clean pass: T&gt;0, R&gt;0, V&gt;0 -->
    <circle cx="85" cy="35" r="4" fill="#1565c0"/>
    <text x="75" y="25" font-size="9" fill="#1565c0">Clean</text>

    <!-- Pyrrhic: T&gt;0, R&lt;0, V&gt;0 -->
    <circle cx="35" cy="75" r="4" fill="#c62828"/>
    <text x="5" y="70" font-size="9" fill="#c62828">Pyrrhic</text>

    <!-- Orthogonal: T&gt;0, R&gt;0, V&lt;0 -->
    <circle cx="135" cy="60" r="4" fill="#2e7d32"/>
    <text x="130" y="55" font-size="9" fill="#2e7d32">Orthogonal</text>

    <!-- Paradox: T&gt;0, R&lt;0, V&lt;0 -->
    <circle cx="75" cy="95" r="4" fill="#f57f17"/>
    <text x="80" y="108" font-size="9" fill="#f57f17">Paradox</text>
  </g>

  <!-- Arrow: projection -->
  <line x1="240" y1="160" x2="300" y2="365" stroke="#999" stroke-width="1.5" stroke-dasharray="8,4" marker-end="url(#arrow)"/>

  <!-- === States collapsed on T axis === -->
  <!-- All four states at T>0, indistinguishable -->

  <!-- Collapsed cluster circle on T>0 side -->
  <ellipse cx="480" cy="340" rx="80" ry="28" fill="#ffcc02" fill-opacity="0.15" stroke="#ffcc02" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Four states overlaid at same T position -->
  <circle cx="440" cy="335" r="4" fill="#1565c0"/>
  <circle cx="470" cy="345" r="4" fill="#c62828"/>
  <circle cx="500" cy="330" r="4" fill="#2e7d32"/>
  <circle cx="510" cy="350" r="4" fill="#f57f17"/>

  <!-- Collapse label -->
  <text x="480" y="305" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">All four states</text>
  <text x="480" y="318" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">collapse to "T &gt; 0"</text>

  <!-- Result annotation (right side) -->
  <rect x="580" y="280" width="190" height="90" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="675" y="300" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Binary evaluation</text>
  <line x1="595" y1="308" x2="755" y2="308" stroke="#eee" stroke-width="1"/>
  <text x="675" y="325" text-anchor="middle" font-size="10" fill="#1565c0">T &gt; 0 → adopt (all 4)</text>
  <text x="675" y="342" text-anchor="middle" font-size="10" fill="#c62828">But 3 require non-adopt actions</text>
  <text x="675" y="360" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">T is not sufficient</text>

</svg>